name: 'Continuous Deployment'

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062 # v5
        id: release
        with:
          release-type: simple
