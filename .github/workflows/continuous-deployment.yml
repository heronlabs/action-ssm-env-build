name: 'Continuous Deployment'

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@5cce733a65ab282167a5b62a1f3a0ae24f5dd23b # v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
