name: 'Continuous Deployment'

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      spec:
        description: The SEMVER specification.
        required: true
        type: choice
        default: patch
        options:
          - 'major'
          - 'minor'
          - 'patch'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: heronlabs/action-tag-release-build@8bb4f38e6a6c99ec6ceabfe76f23f9dbdf64c3f8 # v4.0.6
        with:
          github-token: ${{ github.token }}
          spec: ${{ inputs.spec }}
