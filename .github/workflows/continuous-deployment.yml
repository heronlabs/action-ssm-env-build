name: 'Continuous Deployment'

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      semantic:
        description: The SEMVER specification.
        required: true
        type: choice
        default: patch
        options:
          - 'major'
          - 'minor'
          - 'patch'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: heronlabs/action-tag-release-build@dd7c28e25165dd76494cb9b7e9d035c18e410cd5 # v5.0.5
        with:
          gh_token: ${{ github.token }}
          semantic: ${{ inputs.semantic }}
