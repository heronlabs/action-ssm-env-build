name: build-ssm-env-action

author: Heronlabs

description: Build SSM env

inputs:
  AWS_ACCESS_KEY_ID:
    description: inputs.AWS_ACCESS_KEY_ID
    required: true
  AWS_SECRET_ACCESS_KEY:
    description: inputs.AWS_SECRET_ACCESS_KEY
    required: true
  AWS_ROLE_TO_ASSUME:
    description: inputs.AWS_ROLE_TO_ASSUME
    required: true
  AWS_REGION:
    description: inputs.AWS_REGION
    required: true
  AWS_ROLE_DURATION_SECONDS:
    description: inputs.AWS_ROLE_DURATION_SECONDS
    required: true

runs:
  using: composite
  steps:
    - name: '[CONFIG] | Configure AWS Credentials'
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-region: ${{ inputs.AWS_REGION }}
        aws-access-key-id: ${{ inputs.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ inputs.AWS_SECRET_ACCESS_KEY }}
        role-to-assume: ${{ inputs.AWS_ROLE_TO_ASSUME }}
        role-duration-seconds: ${{ inputs.AWS_ROLE_DURATION_SECONDS }}
        role-session-name: publish-ssm-action-session

    - name: '[BUILD] | Create env file'
      shell: bash
      run: |
        chmod +x ./build-ssm-env-action/core/ssm-to-env.sh
        ./build-ssm-env-action/core/ssm-to-env.sh
